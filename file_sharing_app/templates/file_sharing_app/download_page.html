{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download File | QuickShare</title>
    <link rel="stylesheet" href="{% static 'file_sharing_app/style.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">QuickShare</a>
    </nav>

    <header class="hero">
        <h1>File Ready for Download</h1>
        <p>Someone shared a secure, one-time file with you.</p>
    </header>

    <main class="container" style="text-align: center; max-width: 500px;">
        <div class="result-box" style="background-color: #f8fafc; border-color: #cbd5e1; text-align: center;">
            <h2 style="margin-top: 0; color: #0f172a; font-size: 16pt;">
                📄 {{ filename }}
            </h2>

            <p style="color: #ef4444; font-size: 10pt; font-weight: bold; margin: 15px 0;">
                ⚠️ Note: The file will be permanently deleted from the server immediately after you download it.
            </p>
            
            <a href="?action=download" class="btn" style="display: inline-block; margin-top: 10px; text-decoration: none; width: 100%; box-sizing: border-box;">
                ⬇️ Download Now
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; All rights reserved.</p>
    </footer>

</body>
</html>
